<!-- Flash messages -->
{% with msg = get_flashed_messages(with_categories=True) %}
    {% if msg %}
        {% for category, message in msg %}
        <div class="alert alert-{{ category }} alert-dismissible" style="display: flex; align-items: center; justify-content: space-between; margin: 0; height: 100%; ">
            <strong>{{ message }}</strong>
            <button type="button" class="close" data-dismiss="alert" style="margin-left: 10px;">&times;</button>
        </div>
   
        {% endfor %}
    {% endif %}
{% endwith %}
