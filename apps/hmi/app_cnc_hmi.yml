# ---------------------------------------------------------------------------------------
# 🏭 OpenFactory App configuration file for the CNC HMI
#
# Deploy with:
#   ofa device up 
# ---------------------------------------------------------------------------------------
# Environment variables:
#
# Required:
#   CONTAINER_IP             nfs server for storage
#
# Optional:
#   CNC_HMI_APP_LOG_LEVEL    Log level (default: INFO)
#
# ---------------------------------------------------------------------------------------

apps:

  cnc-hmi-app:
    uuid: CNC-HMI-APP
    image: cnc-hmi-app
    runtime_uid: 1200
    runtime_gid: 1200

    storage:
      instance:
        type: nfs
        server: ${CONTAINER_IP}
        remote_path: /ofa/nfsvolume
        mount_point: /mnt

    environment:
      - LOG_LEVEL=${CNC_HMI_APP_LOG_LEVEL:-DEBUG}

    routing:
      expose: true
      port: 5000
      hostname: cnc-hmi-app

    networks:
      - factory-net
