# ---------------------------------------------------------------------------------------
# 🏭 OpenFactory App configuration file for the OpenFactory Monitor
#
# Deploy with:
#   ofa device up app_monitor.yml
# ---------------------------------------------------------------------------------------
# Environment variables:
#
# Optional:
#   OPENFACTORY_MONITOR_LOG_LEVEL    Log level (default: INFO)
#
# ---------------------------------------------------------------------------------------

apps:

  monitor-app:
    uuid: OPENFACTORY-MONITOR
    image: openfactory-monitor
    environment:
      - LOG_LEVEL=${OPENFACTORY_MONITOR_LOG_LEVEL:-INFO}
      - SHDR_PROBE = true
      - OPCUA_PROBE = true
    routing:
      expose: true
      port: 4000
      hostname: openfactory-monitor
    networks:
      - factory-net
