# ----------------------------------------------------------------------------------
# Prometheus rules for the OpenFactory Monitor
#
# Purpose:
#   This file contains recording rules for metrics generated by the
#   OpenFactory Monitor application.
#
# How to use:
#   In prometheus.yml, include it with rule_files:
#
#   rule_files:
#     - "monitor_rules.yml"
#
# Notes:
#   - Each group defines a set of related rules with a common evaluation interval.
#   - Labels defined in each rule (component, role) will be attached to the
#     resulting metrics and can be used for filtering or aggregating.
# ----------------------------------------------------------------------------------

groups:

  - name: openfactory_monitor_metrics
    interval: 15s
    rules:

      # Build information
      - record: monitor:build_info
        expr: monitor_build_info
        labels:
          component: "monitor"

      # Asset counts
      - record: monitor:deployed_assets
        expr: deployed_assets_count
        labels:
          component: "monitor"

      - record: monitor:available_assets
        expr: available_assets_count
        labels:
          component: "monitor"

      - record: monitor:unavailable_assets
        expr: unavailable_assets_count
        labels:
          component: "monitor"

      # Asset availability ratio
      - record: monitor:asset_availability_ratio
        expr: available_assets_count / deployed_assets_count
        labels:
          component: "monitor"

      # End-to-end latency
      - record: monitor:asset_attribute_end_to_end_latency_seconds
        expr: asset_attribute_end_to_end_latency_seconds
        labels:
          component: "monitor"

      # Ingestion latency
      - record: monitor:asset_attribute_ingestion_latency_seconds
        expr: asset_attribute_ingestion_latency_seconds
        labels:
          component: "monitor"

      # Kafka latency
      - record: monitor:kafka_latency_seconds
        expr: kafka_latency_seconds
        labels:
          component: "monitor"

      # KsqlDB latency
      - record: monitor:ksqldb_latency_seconds
        expr: ksqldb_latency_seconds
        labels:
          component: "monitor"

      # Fan-out layer latency
      - record: monitor:fan_out_layer_latency_seconds
        expr: fan_out_layer_latency_seconds
        labels:
          component: "monitor"

      # Total platform overhead
      - record: monitor:platform_latency_seconds
        expr: app_kafka_latency_seconds + app_fan_out_layer_latency_seconds
        labels:
          component: "monitor"
